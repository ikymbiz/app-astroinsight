<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroInsight - AI占星術＆自己分析</title>
    
    <!-- 外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind カスタム設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        astro: { light: '#e0e7ff', DEFAULT: '#4f46e5', dark: '#312e81' }
                    },
                    spacing: { 'safe-bottom': 'env(safe-area-inset-bottom)' }
                }
            }
        }
    </script>
    
    <style>
        /* モダン・クリーンUI用カスタムCSS */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; overscroll-behavior-y: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(0, 0, 0, 0.05); }
        .tab-content:not(.active) { display: none !important; }
        .tab-content.active { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Markdown スタイル強化 */
        .markdown-body { word-wrap: break-word; overflow-wrap: break-word; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #1e293b; font-weight: bold; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.25rem; } .markdown-body h3 { font-size: 1.1rem; border-bottom: none; }
        .markdown-body p { margin-bottom: 1em; line-height: 1.6; color: #334155; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        .markdown-body li { margin-bottom: 0.25em; color: #334155; }
        .markdown-body strong { color: #0f172a; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1em; display: block; overflow-x: auto; white-space: nowrap; font-size: 0.85rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.5em 0.75em; text-align: left; }
        .markdown-body th { background-color: #f1f5f9; font-weight: bold; color: #1e293b; }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .chat-user { background-color: #4f46e5; color: white; border-radius: 1rem 1rem 0 1rem; }
        .chat-ai { background-color: #ffffff; color: #1e293b; border-radius: 1rem 1rem 1rem 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .dot-flashing { position: relative; width: 8px; height: 8px; border-radius: 5px; background-color: #4f46e5; color: #4f46e5; animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s; }
        .dot-flashing::before, .dot-flashing::after { content: ''; display: inline-block; position: absolute; top: 0; width: 8px; height: 8px; border-radius: 5px; background-color: #4f46e5; color: #4f46e5; animation: dot-flashing 1s infinite alternate; }
        .dot-flashing::before { left: -12px; animation-delay: 0s; }
        .dot-flashing::after { left: 12px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #4f46e5; } 50%, 100% { background-color: #e0e7ff; } }

        .timeline-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; gap: 1rem; padding-bottom: 1rem; scrollbar-width: none; -ms-overflow-style: none; }
        .timeline-carousel::-webkit-scrollbar { display: none; }
        .timeline-card { flex: 0 0 85%; scroll-snap-align: center; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* セグメントコントロール用 */
        .segment-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-slate-800">

    <header class="bg-white shadow-sm z-10 px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-moon text-astro text-xl"></i>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">AstroInsight</h1>
        </div>
        <div class="flex items-center gap-3">
            <div id="wake-lock-status" class="hidden text-xs bg-amber-100 text-amber-700 px-2 py-1 rounded-full flex items-center gap-1"><i class="fa-solid fa-lock"></i> 実行中</div>
            <button onclick="app.ui.switchTab('settings')" class="text-slate-500 hover:text-astro transition"><i class="fa-solid fa-gear text-xl"></i></button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto relative pb-20" id="main-container">
        
        <!-- プロフ -->
        <div id="tab-profile" class="tab-content active p-4 max-w-lg mx-auto">
            <h2 class="text-lg font-bold mb-4 text-slate-700"><i class="fa-solid fa-user-astronaut mr-2"></i>基本プロフィール</h2>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 space-y-4">
                <div><label class="block text-sm font-medium text-slate-600 mb-1">お名前</label><input type="text" id="profile-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-astro"></div>
                <div><label class="block text-sm font-medium text-slate-600 mb-1">生年月日</label><input type="date" id="profile-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-astro"></div>
                <div><label class="block text-sm font-medium text-slate-600 mb-1">出生時間 (任意)</label><input type="time" id="profile-time" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-astro"></div>
                <div><label class="block text-sm font-medium text-slate-600 mb-1">出生地</label><input type="text" id="profile-place" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-astro"></div>
                <button onclick="app.saveProfile()" class="w-full bg-astro hover:bg-astro-dark text-white font-bold py-3 px-4 rounded-xl shadow-md transition transform active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> 保存して分析へ
                </button>
            </div>
        </div>

        <!-- 分析 -->
        <div id="tab-analysis" class="tab-content p-4 max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-700"><i class="fa-solid fa-sparkles mr-2"></i>自己分析</h2>
                <button onclick="app.generateAnalysis()" class="bg-astro text-white px-4 py-2 rounded-full text-sm font-bold shadow-md hover:bg-astro-dark transition active:scale-95 flex items-center gap-1">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 生成・更新
                </button>
            </div>
            <div id="analysis-result" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 markdown-body min-h-[300px]">
                <div class="text-center text-slate-400 py-10"><i class="fa-solid fa-user-astronaut text-4xl mb-3 opacity-50"></i><p>プロフィールを保存後、生成を開始してください。</p></div>
            </div>
            <div id="resume-notice" class="hidden mt-4 bg-blue-50 text-blue-700 p-3 rounded-xl text-sm flex justify-between items-center border border-blue-200">
                <span><i class="fa-solid fa-rotate-right mr-1"></i> 中断データあり</span><button onclick="app.resumeGeneration()" class="font-bold underline">再開する</button>
            </div>
        </div>

        <!-- 今日の星 -->
        <div id="tab-today" class="tab-content p-4 max-w-2xl mx-auto flex-col h-full">
            <h2 class="text-lg font-bold mb-3 text-slate-700 shrink-0"><i class="fa-solid fa-sun mr-2"></i>今日の星と運勢</h2>
            <div class="flex gap-2 mb-4 shrink-0">
                <button onclick="app.generateToday('day')" class="flex-1 bg-astro text-white py-2 rounded-xl text-sm font-bold shadow-md hover:bg-astro-dark transition active:scale-95">今日を占う</button>
                <button onclick="app.generateToday('week')" class="flex-1 bg-slate-800 text-white py-2 rounded-xl text-sm font-bold shadow-md hover:bg-slate-900 transition active:scale-95">今週を占う</button>
            </div>
            <div class="flex-1 overflow-y-auto bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                <div id="today-result" class="markdown-body text-sm min-h-[300px]">
                    <div class="text-center text-slate-400 py-6"><i class="fa-solid fa-cloud-sun text-4xl mb-3 opacity-50"></i><p class="text-sm">ボタンを押して、最新の星の動きを確認しましょう。</p></div>
                </div>
            </div>
        </div>

        <!-- 詳細 (旧トランジット) -->
        <div id="tab-horoscope" class="tab-content p-4 max-w-2xl mx-auto h-full flex-col">
            <h2 class="text-lg font-bold mb-1 text-slate-700 shrink-0"><i class="fa-solid fa-magnifying-glass-chart mr-2"></i>詳細分析</h2>
            <p class="text-xs text-slate-500 mb-3 shrink-0">指定した日時の星が、あなたにどう影響するかを深く分析します。</p>
            <details id="horoscope-details" class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-3 shrink-0 group" open>
                <summary class="p-3 font-bold text-sm text-slate-700 cursor-pointer flex justify-between items-center outline-none">
                    <span class="flex items-center gap-2"><i class="fa-solid fa-calendar-day text-astro"></i> 分析日時を指定する</span>
                    <i class="fa-solid fa-chevron-down text-slate-400 group-open:rotate-180 transition-transform"></i>
                </summary>
                <div class="p-3 pt-0 border-t border-slate-50 mt-1">
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div><label class="block text-xs font-medium text-slate-600 mb-1">年月日</label><input type="date" id="horoscope-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"></div>
                        <div><label class="block text-xs font-medium text-slate-600 mb-1">時間(任意)</label><input type="time" id="horoscope-time" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm"></div>
                    </div>
                    <button onclick="app.generateHoroscope()" class="w-full bg-astro text-white py-2 rounded-xl text-sm font-bold shadow-md hover:bg-astro-dark transition active:scale-95">分析を実行</button>
                </div>
            </details>
            <div id="horoscope-history-container" class="hidden mb-3 shrink-0">
                <div class="relative">
                    <select id="horoscope-history-select" onchange="app.ui.selectHoroscopeHistory(this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 outline-none appearance-none cursor-pointer"></select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400"><i class="fa-solid fa-chevron-down text-sm"></i></div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                <div id="horoscope-result" class="markdown-body text-sm min-h-[300px]">
                    <div class="text-center text-slate-400 py-6"><i class="fa-solid fa-planet-moon text-4xl mb-3 opacity-50"></i><p class="text-sm">分析結果と履歴がここに表示されます。</p></div>
                </div>
            </div>
        </div>

        <!-- 予報 (タイムライン) -->
        <div id="tab-timeline" class="tab-content p-4 max-w-2xl mx-auto flex-col h-full">
            <div class="flex justify-between items-center mb-2 shrink-0">
                <h2 class="text-lg font-bold text-slate-700"><i class="fa-solid fa-chart-line mr-2"></i>星の予報</h2>
                <button onclick="app.generateTimeline()" class="bg-astro text-white px-4 py-2 rounded-full text-sm font-bold shadow-md hover:bg-astro-dark transition active:scale-95 flex items-center gap-1">
                    <i class="fa-solid fa-satellite-dish"></i> 予測開始
                </button>
            </div>
            <!-- 粒度切り替え -->
            <div class="flex gap-2 mb-3 overflow-x-auto pb-1 shrink-0 snap-x">
                <button onclick="app.ui.setForecastTab('monthly')" id="fc-btn-monthly" class="segment-btn active shrink-0 px-3 py-1.5 rounded-full border border-slate-300 text-xs font-bold transition">月次 (1.5年)</button>
                <button onclick="app.ui.setForecastTab('weekly')" id="fc-btn-weekly" class="segment-btn shrink-0 px-3 py-1.5 rounded-full border border-slate-300 text-xs font-bold transition">週次 (3ヶ月)</button>
                <button onclick="app.ui.setForecastTab('daily')" id="fc-btn-daily" class="segment-btn shrink-0 px-3 py-1.5 rounded-full border border-slate-300 text-xs font-bold transition">日次 (2週間)</button>
                <button onclick="app.ui.setForecastTab('hourly')" id="fc-btn-hourly" class="segment-btn shrink-0 px-3 py-1.5 rounded-full border border-slate-300 text-xs font-bold transition">時間 (3日間)</button>
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-3 mb-3 shrink-0">
                <canvas id="timelineChart" height="80" style="max-height: 120px;"></canvas>
            </div>
            <div id="timeline-details" class="timeline-carousel flex-1">
                <div class="text-center text-slate-400 py-6 w-full flex justify-center items-center h-full"><p class="text-sm">予測を開始すると詳細が表示されます。</p></div>
            </div>
        </div>

        <!-- チャット -->
        <div id="tab-chat" class="tab-content flex-col h-full max-w-2xl mx-auto">
            <div class="px-4 py-3 bg-white border-b border-slate-100 shrink-0">
                <h2 class="text-lg font-bold text-slate-700"><i class="fa-regular fa-comments mr-2"></i>星占い師AIチャット</h2>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 pb-4">
                <div class="flex justify-start"><div class="chat-ai px-4 py-3 max-w-[85%] text-sm leading-relaxed">こんにちは！星のこと、なんでも聞いてください。</div></div>
            </div>
            <div class="p-3 bg-slate-50 border-t border-slate-200 shrink-0 pb-safe pb-8">
                <form id="chat-form" class="flex gap-2 relative">
                    <input type="text" id="chat-input" class="flex-1 bg-white border border-slate-300 rounded-full pl-4 pr-12 py-3 text-sm outline-none focus:border-astro transition" placeholder="メッセージを入力...">
                    <button type="submit" class="absolute right-1 top-1 bottom-1 w-10 bg-astro text-white rounded-full flex justify-center items-center hover:bg-astro-dark transition"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>

        <!-- 設定 -->
        <div id="tab-settings" class="tab-content p-4 max-w-lg mx-auto pb-24">
            <h2 class="text-lg font-bold mb-4 text-slate-700"><i class="fa-solid fa-gear mr-2"></i>設定・データ管理</h2>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-4 space-y-3">
                <h3 class="font-bold text-slate-700 border-b pb-2">AIモデル＆システム設定</h3>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">使用するAIモデル</label>
                    <select id="api-model-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-astro">
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (推奨)</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="grok-beta">Grok</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">APIキー</label>
                    <input type="password" id="api-key-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-astro" placeholder="キーを入力...">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">システムプロンプト / 役割設定 (任意)</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-astro" placeholder="例: あなたは辛口で的確なアドバイスをする占い師です..."></textarea>
                </div>
                <button onclick="app.saveSettings()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-xl transition mt-2">設定を保存</button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 space-y-3">
                <h3 class="font-bold text-slate-700 mb-2 border-b pb-2">データ管理</h3>
                <button onclick="app.exportData()" class="w-full bg-blue-50 text-blue-700 border border-blue-200 font-bold py-2 rounded-xl text-sm flex justify-center items-center gap-2"><i class="fa-solid fa-download"></i> バックアップをDL (JSON)</button>
                <label class="w-full bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold py-2 rounded-xl text-sm flex justify-center items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-upload"></i> データを復元 <input type="file" id="import-file" accept=".json" class="hidden" onchange="app.importData(event)">
                </label>
                <button onclick="app.syncToFileSystem()" class="w-full bg-purple-50 text-purple-700 border border-purple-200 font-bold py-2 rounded-xl text-sm flex justify-center items-center gap-2 mt-2"><i class="fa-solid fa-folder-open"></i> ローカルファイルにチャット保存</button>
                <button onclick="app.clearAllData()" class="w-full bg-red-50 text-red-600 border border-red-200 font-bold py-2 rounded-xl text-sm mt-4">全データを消去</button>
            </div>
        </div>
    </main>

    <nav class="glass-nav absolute bottom-0 w-full z-20 pb-safe">
        <ul class="flex justify-between items-center h-16 px-1">
            <li class="flex-1"><button onclick="app.ui.switchTab('profile')" class="nav-btn active-nav w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-user text-base"></i></div><span class="text-[9px] font-medium mt-0.5">プロフ</span></button></li>
            <li class="flex-1"><button onclick="app.ui.switchTab('analysis')" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-star text-base"></i></div><span class="text-[9px] font-medium mt-0.5">分析</span></button></li>
            <li class="flex-1"><button onclick="app.ui.switchTab('today')" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-sun text-base"></i></div><span class="text-[9px] font-medium mt-0.5">今日の星</span></button></li>
            <li class="flex-1"><button onclick="app.ui.switchTab('horoscope')" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-magnifying-glass-chart text-base"></i></div><span class="text-[9px] font-medium mt-0.5">詳細</span></button></li>
            <li class="flex-1"><button onclick="app.ui.switchTab('timeline')" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-chart-line text-base"></i></div><span class="text-[9px] font-medium mt-0.5">予報</span></button></li>
            <li class="flex-1"><button onclick="app.ui.switchTab('chat')" class="nav-btn w-full h-full flex flex-col items-center justify-center text-slate-400 hover:text-astro transition group"><div class="p-1 rounded-full group-[.active-nav]:bg-astro-light group-[.active-nav]:text-astro"><i class="fa-solid fa-message text-base"></i></div><span class="text-[9px] font-medium mt-0.5">チャット</span></button></li>
        </ul>
    </nav>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex flex-col justify-center items-center">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-xs w-full text-center">
            <div class="text-4xl text-astro mb-4 animate-spin"><i class="fa-solid fa-compass"></i></div>
            <h3 class="font-bold text-slate-800 mb-2">星々を読み解いています...</h3>
            <div class="dot-flashing mb-2 mt-2"></div>
        </div>
    </div>

    <script>
        // --- Service Worker & PWA ---
        const swCode = `const CACHE_NAME = 'astro-v2.0'; self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', e => { if(e.request.method !== 'GET') return; e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });`;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(console.error);

        // --- Web Worker (Multi AI Provider SSE Parser) ---
        const workerCode = `
        self.onmessage = async function(e) {
            const { action, apiKey, model, prompt, isJson } = e.data;
            if (action !== 'generate') return;
            try {
                let url, headers, body;
                if (model.startsWith('gemini')) {
                    url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':streamGenerateContent?alt=sse&key=' + apiKey;
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] });
                } else if (model.startsWith('gpt') || model.startsWith('grok')) {
                    url = model.startsWith('gpt') ? 'https://api.openai.com/v1/chat/completions' : 'https://api.x.ai/v1/chat/completions';
                    headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey };
                    body = JSON.stringify({ model: model, messages: [{role: 'user', content: prompt}], stream: true });
                } else if (model.startsWith('claude')) {
                    url = 'https://api.anthropic.com/v1/messages';
                    headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerously-allow-browser': 'true' };
                    body = JSON.stringify({ model: model, max_tokens: 4096, messages: [{role: 'user', content: prompt}], stream: true });
                }

                const response = await fetch(url, { method: 'POST', headers, body });
                if (!response.ok) throw new Error('API Error: ' + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullText = ''; let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split(/\\r?\\n/);
                    buffer = lines.pop(); 
                    
                    for(let line of lines) {
                        line = line.trim();
                        if(line.startsWith('data: ') && line !== 'data: [DONE]') {
                           const dataStr = line.substring(6).trim();
                           try {
                               const data = JSON.parse(dataStr);
                               let chunk = '';
                               if(model.startsWith('gemini') && data.candidates?.[0]?.content?.parts?.[0]?.text) chunk = data.candidates[0].content.parts[0].text;
                               else if((model.startsWith('gpt') || model.startsWith('grok')) && data.choices?.[0]?.delta?.content) chunk = data.choices[0].delta.content;
                               else if(model.startsWith('claude') && data.type === 'content_block_delta' && data.delta?.text) chunk = data.delta.text;
                               
                               if(chunk) { fullText += chunk; if(!isJson) self.postMessage({ type: 'chunk', text: fullText }); }
                           } catch(err) {} 
                        } else if (model.startsWith('claude') && line.startsWith('event: content_block_delta')) {
                            // Anthropic special parsing is handled above by just parsing the next data: line
                        }
                    }
                }
                if(!fullText) throw new Error("応答データが空でした。");
                self.postMessage({ type: 'done', text: fullText });
            } catch (error) { self.postMessage({ type: 'error', message: error.message }); }
        };`;
        const workerBlob = new Blob([workerCode], {type: 'application/javascript'});

        // --- Core Prompt Constraints ---
        const CORE_PROMPT = `
【重要】ポジティブでポップな言葉遣いをベースとしつつ、ネガティブな側面や気をつけるべき点も、ユーザーが前向きに対処できるよう具体的なアドバイスと共に含めてください。
【重要】冥王星がもたらす長期的な変容、運命的な転機、深遠な影響（位置関係やアスペクト）を非常に重要視し、詳細に分析・解説に必ず織り込んでください。`;

        // --- App Logic ---
        class AstroApp {
            constructor() {
                this.dbName = 'AstroInsightDB'; this.dbVersion = 1; this.db = null;
                this.worker = new Worker(URL.createObjectURL(workerBlob));
                this.wakeLock = null; this.chartInstance = null; this.isGenerating = false; this.lastSave = 0;
                this.horoscopeHistory = []; this.forecastType = 'monthly';
                this.setupWorkerListeners();
                this.ui = new UIController(this);
                this.init();
            }

            async init() {
                await this.initDB();
                await this.loadSettings();
                await this.loadProfile();
                await this.loadAnalysis();
                await this.loadHoroscope();
                await this.loadTimeline();
                await this.loadChat();
                this.ui.setupEventListeners();
                this.checkResumeState();
                
                ['profile-name', 'profile-date', 'profile-time', 'profile-place'].forEach(id => 
                    document.getElementById(id).addEventListener('input', this.debounce(() => this.saveProfile(true), 1000)));
            }

            initDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(this.dbName, this.dbVersion);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains('store')) db.createObjectStore('store');
                        if(!db.objectStoreNames.contains('backups')) db.createObjectStore('backups');
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            async getDB(key) {
                if (!this.db) await this.initDB();
                return new Promise(res => { const req = this.db.transaction('store').objectStore('store').get(key); req.onsuccess = () => res(req.result); req.onerror = () => res(null); });
            }

            async setDB(key, value) {
                if (!this.db) await this.initDB();
                return new Promise((res, rej) => { const tx = this.db.transaction('store', 'readwrite'); tx.objectStore('store').put(value, key); tx.oncomplete = () => res(); });
            }

            async loadSettings() {
                const settings = await this.getDB('settings') || { model: 'gemini-2.5-flash', keys: {}, prompt: '' };
                document.getElementById('api-model-select').value = settings.model || 'gemini-2.5-flash';
                document.getElementById('api-key-input').value = settings.keys[settings.model] || '';
                document.getElementById('system-prompt-input').value = settings.prompt || '';
                
                document.getElementById('api-model-select').addEventListener('change', async (e) => {
                    const model = e.target.value; const s = await this.getDB('settings') || {keys:{}};
                    document.getElementById('api-key-input').value = s.keys[model] || '';
                });
            }

            async saveSettings() {
                const model = document.getElementById('api-model-select').value;
                const key = document.getElementById('api-key-input').value.trim();
                const prompt = document.getElementById('system-prompt-input').value.trim();
                if(!key) return alert('APIキーを入力してください。');
                
                let settings = await this.getDB('settings') || { keys: {} };
                settings.model = model; settings.keys[model] = key; settings.prompt = prompt;
                await this.setDB('settings', settings);
                alert('設定を保存しました。');
            }

            async getActiveAIConfig() {
                const s = await this.getDB('settings');
                if(!s || !s.model || !s.keys[s.model]) return null;
                return { model: s.model, apiKey: s.keys[s.model], prompt: s.prompt };
            }

            async loadProfile() {
                const p = await this.getDB('profile');
                if(p) { ['name', 'date', 'time', 'place'].forEach(k => document.getElementById(`profile-${k}`).value = p[k] || ''); }
            }

            async saveProfile(silent = false) {
                const p = { name: document.getElementById('profile-name').value.trim(), date: document.getElementById('profile-date').value, time: document.getElementById('profile-time').value, place: document.getElementById('profile-place').value.trim() };
                if(!silent && (!p.name || !p.date || !p.place)) return alert('必須項目を入力してください。');
                await this.setDB('profile', p);
                if(!silent) { this.ui.switchTab('analysis'); }
            }

            getProfileString() {
                const p = { name: document.getElementById('profile-name').value.trim(), date: document.getElementById('profile-date').value, time: document.getElementById('profile-time').value, place: document.getElementById('profile-place').value.trim() };
                if(!p.name || !p.date) return null; return `名前: ${p.name}, 生年月日: ${p.date}, 出生時間: ${p.time || '不明'}, 出生地: ${p.place}`;
            }

            async requestWakeLock() { if ('wakeLock' in navigator) { try { this.wakeLock = await navigator.wakeLock.request('screen'); document.getElementById('wake-lock-status').classList.remove('hidden'); } catch (e) {} } }
            releaseWakeLock() { if (this.wakeLock) { this.wakeLock.release().then(() => { this.wakeLock = null; document.getElementById('wake-lock-status').classList.add('hidden'); }); } }

            setupWorkerListeners() {
                this.worker.onmessage = async (e) => {
                    const data = e.data;
                    if(data.type === 'chunk') {
                        const targetId = this.currentTask === 'analysis' ? 'analysis-result' : this.currentTask === 'today' ? 'today-result' : this.currentTask === 'horoscope' ? 'horoscope-result' : null;
                        if(targetId) {
                            document.getElementById(targetId).innerHTML = marked.parse(data.text) + '<span class="text-astro animate-pulse"> ▍</span>';
                            if(this.currentTask === 'analysis' && (!this.lastSave || Date.now() - this.lastSave > 1500)) { await this.setDB('resume_state', { task: 'analysis', text: data.text }); this.lastSave = Date.now(); }
                        }
                    } else if (data.type === 'done') { this.finishGeneration(data.text);
                    } else if (data.type === 'error') { this.handleError(data.message); }
                };
            }

            async startGeneration(task, promptStr, isJson = false) {
                const cfg = await this.getActiveAIConfig();
                if(!cfg) return alert('設定タブからAIモデルとAPIキーを設定してください。');
                
                const sysPrompt = cfg.prompt ? `【システム役割】\n${cfg.prompt}\n\n` : '';
                const finalPrompt = sysPrompt + promptStr + CORE_PROMPT;

                this.isGenerating = true; this.currentTask = task; this.lastSave = 0;
                await this.requestWakeLock(); document.getElementById('loading-overlay').classList.remove('hidden');
                await this.setDB('resume_state', { task: task, text: '', prompt: finalPrompt, isJson });
                this.worker.postMessage({ action: 'generate', apiKey: cfg.apiKey, model: cfg.model, prompt: finalPrompt, isJson });
            }

            async finishGeneration(finalText) {
                this.isGenerating = false; document.getElementById('loading-overlay').classList.add('hidden'); this.releaseWakeLock();
                try {
                    if (this.currentTask === 'analysis') { document.getElementById('analysis-result').innerHTML = marked.parse(finalText); await this.setDB('analysis_result', finalText);
                    } else if (this.currentTask === 'today') { document.getElementById('today-result').innerHTML = marked.parse(finalText);
                    } else if (this.currentTask === 'chat') { await this.addChatMessage('model', finalText);
                    } else if (this.currentTask === 'timeline') { await this.processTimelineResult(finalText);
                    } else if (this.currentTask === 'horoscope') {
                        let history = await this.getDB('horoscope_history') || []; const timestamp = Date.now();
                        history.unshift({ id: timestamp, date: document.getElementById('horoscope-date').value, time: document.getElementById('horoscope-time').value, text: finalText });
                        await this.setDB('horoscope_history', history); this.horoscopeHistory = history;
                        this.ui.renderHoroscopeHistory(history); this.ui.selectHoroscopeHistory(timestamp);
                    }
                    await this.setDB('resume_state', null);
                } catch(e) { this.handleError(e.message); }
            }

            handleError(msg) { this.isGenerating = false; document.getElementById('loading-overlay').classList.add('hidden'); this.releaseWakeLock(); alert('エラー発生: ' + msg); }

            async checkResumeState() { const s = await this.getDB('resume_state'); if(s && s.text && s.task === 'analysis') document.getElementById('resume-notice').classList.remove('hidden'); }
            async resumeGeneration() { const s = await this.getDB('resume_state'); if(s && s.task === 'analysis') { document.getElementById('resume-notice').classList.add('hidden'); document.getElementById('analysis-result').innerHTML = marked.parse(s.text) + "\n*(中断)*"; this.ui.switchTab('analysis'); } }

            async loadAnalysis() { const res = await this.getDB('analysis_result'); if(res) document.getElementById('analysis-result').innerHTML = marked.parse(res); }
            async generateAnalysis() {
                const p = this.getProfileString(); if(!p) return alert('プロフィールを入力してください。');
                const prompt = `以下のプロフィールから自己分析を行ってください。専門用語は避け絵文字を使ってください。\nプロフィール: ${p}`;
                document.getElementById('analysis-result').innerHTML = ''; this.startGeneration('analysis', prompt, false);
            }

            async generateToday(type) {
                const p = this.getProfileString(); if(!p) return alert('プロフィールを設定してください。');
                const period = type === 'day' ? '今日1日' : '今週1週間';
                const prompt = `プロフィール情報（ネイタル）に対し、${period}の星の配置（トランジット）の影響を分析し、運勢とアドバイスを出力してください。\nプロフィール: ${p}`;
                document.getElementById('today-result').innerHTML = ''; this.startGeneration('today', prompt, false);
            }

            async loadHoroscope() {
                const h = await this.getDB('horoscope_history') || []; this.horoscopeHistory = h;
                this.ui.renderHoroscopeHistory(h); if(h.length > 0) this.ui.selectHoroscopeHistory(h[0].id);
            }
            async generateHoroscope() {
                const d = document.getElementById('horoscope-date').value; const t = document.getElementById('horoscope-time').value; const p = this.getProfileString();
                if(!p || !d) return alert('プロフィールと年月日が必要です。');
                document.getElementById('horoscope-details').removeAttribute('open');
                const prompt = `出生情報に対し、指定日時の星の配置の影響を詳細に分析してください。\nネイタル: ${p}\nトランジット日時: ${d} ${t}`;
                document.getElementById('horoscope-result').innerHTML = ''; this.startGeneration('horoscope', prompt, false);
            }

            async generateTimeline() {
                const p = this.getProfileString(); if(!p) return alert('プロフィールを設定してください。');
                const typeInfo = {
                    'monthly': { desc: '今月から1年半（18ヶ月間）', fmt: 'YYYY-MM', count: 18 },
                    'weekly': { desc: '今週から3ヶ月間（12週間）', fmt: 'YYYY年M月第W週', count: 12 },
                    'daily': { desc: '今日から2週間（14日間）', fmt: 'MM/DD', count: 14 },
                    'hourly': { desc: '現在から3日間（72時間ごとではなく、3時間区切りで24期間等、適度に丸めて合計約24個）', fmt: 'MM/DD HH:00', count: 24 }
                };
                const info = typeInfo[this.forecastType];
                const prompt = `プロフィールを持つ人物の【${info.desc}】の星の影響を予測してください。
【重要】出力は必ず以下のJSON配列形式のみとしてください。Markdown修飾(\`\`\`jsonなど)は一切不要です。直接 [ で開始してください。
フォーマット: [{"period": "期間文字列(${info.fmt})", "impact": 0〜100の数値, "theme": "主要テーマ", "description": "アドバイス" }, ...(${info.count}個)]\nプロフィール: ${p}`;
                this.startGeneration('timeline', prompt, true);
            }

            async processTimelineResult(text) {
                try {
                    let clean = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const s = clean.indexOf('['); const e = clean.lastIndexOf(']');
                    if (s !== -1 && e !== -1) clean = clean.substring(s, e + 1); else throw new Error("JSON配列が見つかりません。");
                    const data = JSON.parse(clean); if (!Array.isArray(data)) throw new Error("不正なデータ");
                    await this.setDB(`timeline_${this.forecastType}`, data); this.renderTimeline(data);
                } catch(e) { this.handleError('データ解析失敗(AI出力の乱れ): ' + e.message); }
            }

            async loadTimeline() { const d = await this.getDB(`timeline_${this.forecastType}`); if(d) this.renderTimeline(d); else document.getElementById('timeline-details').innerHTML = '<div class="text-center text-slate-400 py-6 w-full"><p class="text-sm">予測データがありません。「予測開始」を押してください。</p></div>'; }

            renderTimeline(data) {
                if(!data || data.length===0) return;
                const labels = data.map(d => d.period); const impacts = data.map(d => d.impact);
                const ctx = document.getElementById('timelineChart').getContext('2d');
                if(this.chartInstance) this.chartInstance.destroy();
                const pointBg = new Array(data.length).fill('#fff'); const pointRad = new Array(data.length).fill(4); pointBg[0] = '#4f46e5'; pointRad[0] = 8;

                this.chartInstance = new Chart(ctx, {
                    type: 'line', data: { labels, datasets: [{ label: '影響度', data: impacts, borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.2)', tension: 0.4, fill: true, pointBackgroundColor: pointBg, pointBorderColor: '#4f46e5', pointBorderWidth: 2, pointRadius: pointRad }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 }, x: { ticks: { maxTicksLimit: 6 } } }, plugins: { legend: { display: false } }, animation: { duration: 500 } }
                });

                const cont = document.getElementById('timeline-details'); cont.innerHTML = '';
                data.forEach((item) => {
                    const card = document.createElement('div'); card.className = 'timeline-card bg-white rounded-xl shadow-sm border border-slate-100 p-5 border-t-4 border-t-astro h-full flex flex-col';
                    card.innerHTML = `<div class="flex justify-between items-center mb-3 shrink-0"><h4 class="font-bold text-slate-800 text-lg">${item.period}</h4><span class="text-xs font-bold px-3 py-1 rounded-full bg-astro-light text-astro border border-indigo-200">影響度: ${item.impact}</span></div><h5 class="text-sm font-bold text-astro mb-2 shrink-0"><i class="fa-solid fa-star mr-1"></i>${item.theme}</h5><div class="flex-1 overflow-y-auto pr-1"><p class="text-sm text-slate-600 leading-relaxed">${item.description}</p></div>`;
                    cont.appendChild(card);
                });

                cont.onscroll = () => {
                    if(!cont.children[0]) return;
                    const w = cont.children[0].offsetWidth + 16; const idx = Math.min(Math.max(Math.round(cont.scrollLeft / w), 0), data.length - 1);
                    const chart = this.chartInstance; chart.data.datasets[0].pointBackgroundColor = data.map((_, i) => i === idx ? '#4f46e5' : '#fff'); chart.data.datasets[0].pointRadius = data.map((_, i) => i === idx ? 8 : 4); chart.update('none');
                };
            }

            async loadChat() {
                const chats = await this.getDB('chat_history') || []; const cont = document.getElementById('chat-messages');
                if(chats.length > 0) { cont.innerHTML = ''; chats.forEach(c => this.ui.appendChatBubble(c.role, c.text)); setTimeout(()=> cont.scrollTop = cont.scrollHeight, 100); }
            }
            async handleChatSubmit(e) {
                e.preventDefault(); const input = document.getElementById('chat-input'); const text = input.value.trim(); if(!text) return;
                input.value = ''; await this.addChatMessage('user', text);
                const p = this.getProfileString() || '未設定'; const a = await this.getDB('analysis_result') || 'なし'; let chats = await this.getDB('chat_history') || [];
                const hist = chats.slice(-6).map(c => `${c.role}: ${c.text}`).join('\n');
                const prompt = `ユーザーからの質問に答えてください。\n【プロフ】${p}\n【分析】${a.substring(0, 200)}\n【履歴】${hist}\n最新の質問: ${text}\n回答:`;
                this.startGeneration('chat', prompt, false);
            }
            async addChatMessage(role, text) {
                let chats = await this.getDB('chat_history') || []; chats.push({ role, text, time: Date.now() });
                await this.setDB('chat_history', chats); this.ui.appendChatBubble(role, text);
            }

            async exportData() {
                const keys = ['settings', 'profile', 'analysis_result', 'timeline_monthly', 'chat_history', 'horoscope_history']; const data = {}; for(let k of keys) data[k] = await this.getDB(k);
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: 'application/json'})); a.download = `astro_backup.json`; a.click();
            }
            importData(e) {
                const f = e.target.files[0]; if(!f) return; const reader = new FileReader();
                reader.onload = async (ev) => { try { const data = JSON.parse(ev.target.result); for(let k in data) await this.setDB(k, data[k]); alert('復元しました。再読込します。'); location.reload(); } catch(err) { alert('失敗しました。'); } }; reader.readAsText(f);
            }
            async syncToFileSystem() {
                try {
                    const handle = await window.showSaveFilePicker({ suggestedName: 'astro_chat.json', types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
                    const w = await handle.createWritable(); await w.write(JSON.stringify(await this.getDB('chat_history'), null, 2)); await w.close(); alert('保存しました。');
                } catch(e) { console.error(e); }
            }
            async clearAllData() { if(confirm('全消去しますか？')) { const tx = this.db.transaction(['store', 'backups'], 'readwrite'); tx.objectStore('store').clear(); tx.objectStore('backups').clear(); tx.oncomplete = () => location.reload(); } }
            debounce(func, wait) { let t; return function(...args) { clearTimeout(t); t = setTimeout(() => func.apply(this, args), wait); }; }
        }

        class UIController {
            constructor(app) { this.app = app; }
            setupEventListeners() { document.getElementById('chat-form').addEventListener('submit', (e) => this.app.handleChatSubmit(e)); }
            switchTab(id) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(`tab-${id}`).classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-nav'));
                const m = { 'profile':0, 'analysis':1, 'today':2, 'horoscope':3, 'timeline':4, 'chat':5 };
                if(m[id] !== undefined) document.querySelectorAll('.nav-btn')[m[id]].classList.add('active-nav');
            }
            appendChatBubble(role, text) {
                const c = document.getElementById('chat-messages'); const div = document.createElement('div'); div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
                const b = document.createElement('div'); b.className = `px-4 py-3 max-w-[85%] text-sm leading-relaxed ${role === 'user' ? 'chat-user' : 'chat-ai'}`;
                if (role === 'model') b.innerHTML = marked.parse(text); else b.textContent = text;
                div.appendChild(b); c.appendChild(div); c.scrollTop = c.scrollHeight;
            }
            renderHoroscopeHistory(h) {
                const c = document.getElementById('horoscope-history-container'); const s = document.getElementById('horoscope-history-select');
                if (!h || h.length === 0) { c.classList.add('hidden'); return; }
                c.classList.remove('hidden'); s.innerHTML = h.map(i => `<option value="${i.id}">指定日: ${i.date} ${i.time || ''}</option>`).join('');
            }
            selectHoroscopeHistory(id) { const i = (this.app.horoscopeHistory || []).find(h => h.id == id); if (i) { document.getElementById('horoscope-result').innerHTML = marked.parse(i.text); document.getElementById('horoscope-history-select').value = id; } }
            setForecastTab(type) {
                this.app.forecastType = type;
                ['monthly', 'weekly', 'daily', 'hourly'].forEach(t => {
                    const btn = document.getElementById(`fc-btn-${t}`);
                    if(t === type) { btn.classList.add('active', 'bg-astro', 'text-white'); btn.classList.remove('bg-white', 'text-slate-600'); }
                    else { btn.classList.remove('active', 'bg-astro', 'text-white'); btn.classList.add('bg-white', 'text-slate-600'); }
                });
                this.app.loadTimeline();
            }
        }

        const app = new AstroApp();
    </script>
